<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mídias em HTML5</title>
</head>
<body>
    <h1>Imagem dinâmica</h1>
    <p>Aumente e diminua a largura e altura do seu navegador</p>

    <picture>
        <source media="(max-width: 750px)" srcset="imagens/imagensex011/fundo-p.png" type="image/png">
        <source media="(max-width: 1050px)" srcset="imagens/imagensex011/fundo-m.png" type="image/png">
        <img src="imagens/imagensex011/fundo-g.png" alt="Imagem dinâmica grande">

    </picture>
    <hr>
    <h2>Reprodução de Áudios</h2>
    <ul type="disc">Formatos de áudios
        <ol>
            <li>MP3</li>
        </ol>
    </ul> 
    <audio preload="none" controls>
        <source src="midias/07 - 04AM.ogg" type="audio/ogg">
        <source src="midias/07 - 04AM.mp3" type="audio/mpeg">
        <source src="midias/07 - 04AM.wav" type="audio/wav">
    </audio>
</body>
</html>
