<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video</title>
</head>
<body>
    <main>
        <section>
            <h1>Abaixo você verá um vídeo compatível com a maioria dos navegadores: </h1>
            <video width="600px" controls>
                <source src="video.mp4" type="video/mp4">
                <source src="video.mkv" type="video/mkv">
                <source src="video.webm" type="video/webm">
                Seu navegador não suporta a maioria dos formatos de vídeo <br>
                Baixe o vídeo <a href="video.mp4">aqui</a>
            </video>
        </section>
    </main>
</body>
</html>
