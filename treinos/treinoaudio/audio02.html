<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio02</title>
</head>
<body>
    <main>
        <section id="audios_com">
            <h1>Abaixo você ouvirá áudios com compatibilidade a maior parte dos navegadores: </h1>
            <audio controls>
                <source src="musica.mp3" type="audio/mpeg">
                <source src="musica.ogg" type="audio/ogg">
                <source src="musica.wav" type="audio/wav">
                <source src="musica.webm" type="audio/webm">
                Seu navegador não suporta o elemento de áudio.
            </audio>
        </section>
    </main>
</body>
</html>
